<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>PetShop Encantado</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body onload="boasVindas()">

<!-- MENU -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">PetShop Encantado</span>
    <a href="cadastro.html" class="btn btn-success">Agendar</a>
  </div>
</nav>

<!-- TÍTULO -->
<div class="container text-center mt-4">
  <h1>Bem-vindo ao PetShop Encantado 🐶</h1>
  <p>Seu pet merece o melhor cuidado!</p>
</div>

<!-- CARROSSEL -->
<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="imagens/pet1.png" class="d-block w-100" alt="Cachorro feliz no petshop">
    </div>

    <div class="carousel-item">
      <img src="imagens/pet2.png" class="d-block w-100" alt="Banho em cachorro">
    </div>

    <div class="carousel-item">
      <img src="imagens/pet3.jpg" class="d-block w-100" alt="Tosa de pet">
    </div>

  </div>

  <!-- BOTÕES -->
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

<!-- SCRIPT BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- SEU JS -->
<script src="script.js"></script>

</html>
